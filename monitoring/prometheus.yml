global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'scanner'
    static_configs:
      - targets: ['scanner:8001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'validator'
    static_configs:
      - targets: ['validator:8002']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'simulator'
    static_configs:
      - targets: ['simulator:8003']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
