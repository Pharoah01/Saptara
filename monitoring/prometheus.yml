global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Security Test Suite Services
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'scanner'
    static_configs:
      - targets: ['scanner:8001']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'validator'
    static_configs:
      - targets: ['validator:8002']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'simulator'
    static_configs:
      - targets: ['simulator:8003']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Infrastructure Services
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'postgres'
    static_configs:
      - targets: ['database:5432']
    scrape_interval: 30s

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s