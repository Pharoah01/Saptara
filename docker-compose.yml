# Project SAPTARA - Seven relics. Seven roles. One system.
# SAPTARA — a system where protection emerges from unity.

services:
  # Shared base image — built once, inherited by all four services
  base:
    build:
      context: .
      dockerfile: Dockerfile.base
    image: saptara-base
    profiles: ["build-only"]   # never starts as a container, just provides the image

  # The Orchestrator - The Conductor
  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - TZ=Asia/Kolkata
      - SERVICE_NAME=orchestrator
      - RELIC_ROLE=conductor
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://saptara_keeper:seven_relics_unite@database:5432/saptara_knowledge
      - API_KEYS=${API_KEYS:-saptara-dev-key-change-me}
      - SCANNER_URL=http://scanner:8001
      - VALIDATOR_URL=http://validator:8002
      - SIMULATOR_URL=http://simulator:8003
    depends_on:
      database:
        condition: service_healthy
      scanner:
        condition: service_started
      validator:
        condition: service_started
      simulator:
        condition: service_started
    restart: unless-stopped
    networks:
      - saptara-network

  # The Scanner - The Seeker
  scanner:
    build:
      context: .
      dockerfile: services/scanner/Dockerfile
    ports:
      - "8001:8001"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - TZ=Asia/Kolkata
      - SERVICE_NAME=simulator
      - RELIC_ROLE=seeker
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://saptara_keeper:seven_relics_unite@database:5432/saptara_knowledge
      - API_KEYS=${API_KEYS:-saptara-dev-key-change-me}
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - saptara-network

  # The Validator - The Guardian
  validator:
    build:
      context: .
      dockerfile: services/validator/Dockerfile
    ports:
      - "8002:8002"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - SERVICE_NAME=validator
      - RELIC_ROLE=guardian
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://saptara_keeper:seven_relics_unite@database:5432/saptara_knowledge
      - API_KEYS=${API_KEYS:-saptara-dev-key-change-me}
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - saptara-network

  # The Simulator - The Challenger
  simulator:
    build:
      context: .
      dockerfile: services/simulator/Dockerfile
    ports:
      - "8003:8003"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - SERVICE_NAME=simulator
      - RELIC_ROLE=challenger
      - LOG_LEVEL=INFO
      - DATABASE_URL=postgresql+asyncpg://saptara_keeper:seven_relics_unite@database:5432/saptara_knowledge
      - API_KEYS=${API_KEYS:-saptara-dev-key-change-me}
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - saptara-network

  # The Keeper - The Memory
  database:
    image: postgres:15
    environment:
      - POSTGRES_DB=saptara_knowledge
      - POSTGRES_USER=saptara_keeper
      - POSTGRES_PASSWORD=seven_relics_unite
    ports:
      - "5432:5432"
    volumes:
      - saptara_memory:/var/lib/postgresql/data
    networks:
      - saptara-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saptara_keeper -d saptara_knowledge"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # The Messenger - The Swift
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - saptara-network

  # The Observer - The Watcher (Metrics)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - saptara-network

  # The Watcher's Vision (Dashboards)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=saptara_vision
    volumes:
      - saptara_vision:/var/lib/grafana
    networks:
      - saptara-network

volumes:
  saptara_memory:
  saptara_vision:

networks:
  saptara-network:
    driver: bridge